<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandwidth Hero Proxy</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlBox = document.getElementById("proxy-url");
      // Automatically detect current domain
      urlBox.textContent = `${window.location.origin}/api/index`;
    });
  </script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-xl mx-auto text-center py-12">
    <h1 class="text-3xl font-bold">Bandwidth Hero Proxy</h1>
    <p class="mt-4">Compress images on-the-fly using Netlify Functions.</p>

    <div class="bg-white shadow-md p-6 rounded-lg mt-6 text-left">
      <h2 class="font-semibold">Setup Instructions</h2>
      <ol class="list-decimal list-inside mt-2 text-gray-700">
        <li>Install the <a href="https://bandwidth-hero.com" class="text-blue-600">Bandwidth Hero extension</a>.</li>
        <li>In the extension, set Data Compression Service to:<br>
          <code id="proxy-url" class="bg-gray-100 px-2 py-1 rounded"></code>
        </li>
        <li>Enjoy faster, compressed browsing 🎉</li>
      </ol>
    </div>
  </div>
</body>
</html>
